kind = "web"
previewPath = "/"
title = "Demandly — AI Front Desk"
version = "1.0.0"
id = "artifacts/demandly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20574

[services.development]
run = "pnpm --filter @workspace/demandly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/demandly", "run", "build" ]
publicDir = "artifacts/demandly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20574"
BASE_PATH = "/"
