<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary Meta -->
    <title>Demandly — AI Front Desk for Businesses & Coaches</title>
    <meta name="description" content="Demandly is an AI front desk that answers calls, texts back missed leads in 60 seconds, books appointments, and sends you a WhatsApp alert — 24/7, starting at $599/mo." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="canonical" href="https://demandly.ai/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://demandly.ai/" />
    <meta property="og:title" content="Demandly — AI Front Desk for Businesses & Coaches" />

    <meta property="og:site_name" content="Demandly" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Demandly — AI Front Desk for Businesses & Coaches" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts — display=swap already prevents render blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

      "@type": "WebApplication",
      "name": "Demandly",
      "url": "https://demandly.ai",
      "description": "AI front desk for businesses and coaches. Answers calls, texts back missed leads, books appointments, and sends WhatsApp alerts — 24/7.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Starter",
          "price": "299",
          "priceCurrency": "USD",
          "billingPeriod": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Growth",
          "price": "599",
          "priceCurrency": "USD",
          "billingPeriod": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Full Stack",
          "price": "999",
          "priceCurrency": "USD",
          "billingPeriod": "P1M"
        }
      ],
      "publisher": {
        "@type": "Organization",
        "name": "Demandly",
        "url": "https://demandly.ai"
      }
    }
    </script>

    <script type="application/ld+json">
